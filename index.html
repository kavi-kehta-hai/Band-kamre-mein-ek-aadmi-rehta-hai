<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Band Kamre Mein Ek Aadmi Rehta Hai</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://counterapi.dev/js/track.js" async></script>
</head>
<body>
    <div class="stats-banner">
        <p>Live Stats: <span id="live-stats"></span></p>
    </div>
    <header class="hero-section">
        <img src="cover.jpg" alt="Cover Image" class="cover-image">
        <h1>Welcome to Our Project</h1>
        <button class="cta-button">Get Started</button>
    </header>
    <main>
        <div class="live-stats-card">
            <script>
                fetch('https://counterapi.dev/api/stats')
                    .then(response => response.json())
                    .then(data => {
                        document.getElementById('live-stats').innerText = `Views: ${data.views}, Reads: ${data.reads}, Downloads: ${data.downloads}`;
                    })
                    .catch(error => {
                        console.error('Error fetching stats:', error);
                    });
            </script>
        </div>
        <section class="quote-section">
            <blockquote>
                <p>“Your quote goes here.”</p>
            </blockquote>
        </section>
        <section class="about-section">
            <h2>About</h2>
            <p>Details about your project.</p>
        </section>
        <section class="sections-list">
            <h2>Sections</h2>
            <ul>
                <li>Section 1</li>
                <li>Section 2</li>
                <li>Section 3</li>
            </ul>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Band Kamre Mein Ek Aadmi Rehta Hai</p>
    </footer>
</body>
</html>
