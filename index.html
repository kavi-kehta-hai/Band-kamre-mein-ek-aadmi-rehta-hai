<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>बंद कमरे में एक आदमी रहता है — कवि कहता है</title>
<meta name="description" content="एक मुफ़्त हिंदी कविता संग्रह — कवि कहता है द्वारा। Free Hindi Poetry Book." />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@300;400;600;700;800&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root{
    --bg:#0b0c14;
    --bg2:#121426;
    --card:rgba(18,20,38,0.72);
    --card2:rgba(255,255,255,0.03);
    --gold:#f0c87a;
    --gold2:#c98f2d;
    --white:#f5f3ee;
    --grey:#b7b8cc;
    --dim:#747891;
    --rule:rgba(255,255,255,0.09);
    --shadow: 0 18px 50px rgba(0,0,0,0.45);
  }

  html { scroll-behavior: smooth; }
  body {
    min-height: 100vh;
    overflow-x: hidden;
    color: var(--white);
    font-family: 'Noto Serif Devanagari', serif;
    background:
      radial-gradient(circle at top, rgba(240,200,122,0.10), transparent 28%),
      radial-gradient(circle at 20% 20%, rgba(201,143,45,0.12), transparent 22%),
      linear-gradient(180deg, #0b0c14 0%, #0f1120 45%, #0a0b12 100%);
  }

  body::before{
    content:'';
    position:fixed;
    inset:0;
    pointer-events:none;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    opacity:0.45;
    z-index:0;
  }

  @keyframes floatUp {
    from { opacity:0; transform:translateY(20px); }
    to   { opacity:1; transform:translateY(0); }
  }

  @keyframes glowPulse {
    0%,100% { transform:scale(1); opacity:0.75; }
    50% { transform:scale(1.03); opacity:1; }
  }

  .hero {
    min-height: 100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding: 42px 22px 56px;
    position:relative;
    z-index:1;
  }

  .cover-wrap {
    position:relative;
    width:min(300px, 76vw);
    margin-bottom: 34px;
    animation: floatUp 0.9s ease both;
  }

  .cover-img {
    width:100%;
    border-radius:18px;
    box-shadow: var(--shadow);
  }

  .book-title {
    font-size: clamp(30px, 6.2vw, 58px);
    color: var(--gold);
    font-weight:800;
  }

  .author { color: var(--grey); margin-top:10px; }

  .buttons {
    margin-top: 30px;
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  .btn {
    padding:15px;
    border-radius:16px;
    text-decoration:none;
    font-weight:700;
  }

  .btn-primary {
    background: linear-gradient(135deg, #f0c87a, #c98f2d);
    color:black;
  }

  .btn-secondary {
    border:1px solid var(--gold);
    color:var(--gold);
  }

  .sections {
    max-width:900px;
    margin:auto;
    padding:40px 20px;
  }

  .section-item {
    padding:15px 0;
    border-bottom:1px solid var(--rule);
  }

  .sec-num {
    color: var(--gold);
    font-weight:bold;
  }

  footer {
    text-align:center;
    padding:40px;
    border-top:1px solid var(--rule);
  }
</style>
</head>

<body>

<section class="hero">
  <div class="cover-wrap">
    <img src="cover.jpg" class="cover-img">
  </div>

  <h1 class="book-title">बंद कमरे में एक आदमी रहता है</h1>
  <p class="author">कवि कहता है</p>

  <div class="buttons">
    <a href="band_kamra_v5.pdf" class="btn btn-primary">📖 Read</a>
    <a href="band_kamra_v5.pdf" download class="btn btn-secondary">⬇ Download</a>
  </div>
</section>

<section class="sections">
  <div class="section-item"><div class="sec-num">1</div>बंद कमरा</div>
  <div class="section-item"><div class="sec-num">2</div>खुद से जंग</div>
  <div class="section-item"><div class="sec-num">3</div>ठहरा हुआ वक़्त</div>
  <div class="section-item"><div class="sec-num">4</div>टूटने से पहले</div>
  <div class="section-item"><div class="sec-num">5</div>एक रोशनदान</div>
</section>

<footer>
  <p>कवि कहता है</p>
</footer>

</body>
</html>
